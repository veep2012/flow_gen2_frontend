upstream flow_ui {
    server ui:5558;
}

upstream flow_ui_test {
    server ui_api_test:5557;
}

upstream flow_api {
    server api:5556;
}

server {
    listen 80;
    server_name _;

    auth_basic "Restricted access";
    auth_basic_user_file /etc/nginx/.htpasswd;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Allow favicon without auth and serve it locally
    location = /favicon.svg {
        auth_basic off;
        alias /usr/share/nginx/html/favicon.svg;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location ~* ^/api(/v1)?/ {
        proxy_pass http://flow_api;
    }

    location /docs {
        proxy_pass http://flow_api;
    }

    location /openapi.json {
        proxy_pass http://flow_api;
    }

    location / {
        proxy_pass http://flow_ui/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location /test_api/ {
        proxy_pass http://flow_ui_test/test_api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
