upstream flow_ui {
    server ui:5558;
}

upstream flow_api {
    server api:5556;
}

upstream oauth2_proxy {
    server oauth2_proxy:4180;
}

limit_req_zone $binary_remote_addr zone=oauth2_limit:10m rate=5r/s;
map $auth_user $resolved_user_id {
    default $auth_user;
    "~^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$" $auth_email;
}

server {
    listen 80;
    server_name _;
    client_max_body_size 128m;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Allow favicon without auth and serve it locally
    location = /favicon.svg {
        alias /usr/share/nginx/html/favicon.svg;
        auth_request off;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location = /oauth2/auth {
        auth_request off;
        proxy_pass http://oauth2_proxy;
        proxy_set_header X-Forwarded-Uri $request_uri;
    }

    location /oauth2/ {
        auth_request off;
        limit_req zone=oauth2_limit burst=10 nodelay;
        proxy_pass http://oauth2_proxy;
        proxy_set_header X-Forwarded-Uri $request_uri;
    }

    auth_request /oauth2/auth;
    error_page 401 = /oauth2/start?rd=$request_uri;
    # oauth2-proxy sets X-Auth-Request-User/Email; nginx exposes them as $upstream_http_x_auth_request_*.
    auth_request_set $auth_user $upstream_http_x_auth_request_user;
    auth_request_set $auth_email $upstream_http_x_auth_request_email;
    proxy_set_header X-User-Id $resolved_user_id;
    proxy_set_header X-User $auth_user;
    proxy_set_header X-Email $auth_email;

    location ~* ^/api(/v1)?/ {
        proxy_pass http://flow_api;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_set_header X-Auth-User $resolved_user_id;
        proxy_set_header X-User-Id "";
    }

    location /docs {
        proxy_pass http://flow_api;
    }

    location /openapi.json {
        proxy_pass http://flow_api;
    }

    location / {
        proxy_pass http://flow_ui/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

}
