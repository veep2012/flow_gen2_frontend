services:
  postgres: &postgres_base
    image: postgres:16-alpine
    container_name: flow_gen2_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-flow_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-flow_pass}
      POSTGRES_DB: ${POSTGRES_DB:-flow_db}
    expose:
      - ${POSTGRES_PORT:-5432}
    volumes:
      - flow_pg_data:/var/lib/postgresql/data
      - ./init/flow_init.sql:/docker-entrypoint-initdb.d/00_flow_init.sql:ro
      - ./init/flow_seed.sql:/docker-entrypoint-initdb.d/01_flow_seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-flow_user} -d ${POSTGRES_DB:-flow_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  postgres_local:
    <<: *postgres_base
    container_name: flow_gen2_postgres_local
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    profiles:
      - local

  api:
    container_name: flow_gen2_api
    build:
      context: ..
      dockerfile: ci/Dockerfile.api
    environment:
      PORT: 5556
      # Comma-separated list; include deployed UI origins
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost,http://localhost:5557,http://89.35.124.200:5557}
    expose:
      - "5556"
    depends_on:
      - postgres
    restart: unless-stopped

  ui:
    container_name: flow_gen2_ui
    build:
      context: ..
      dockerfile: ci/Dockerfile.ui
    expose:
      - "5558"
    depends_on:
      - api
    restart: unless-stopped

  ui_api_test:
    container_name: flow_gen2_ui_api_test
    build:
      context: ..
      dockerfile: ci/Dockerfile.ui_api_test
    expose:
      - "5557"
    depends_on:
      - api
    restart: unless-stopped

  nginx:
    container_name: flow_gen2_nginx
    image: nginx:1.25-alpine
    ports:
      - "80:80"
    environment:
      BASIC_AUTH_USER: ${BASIC_AUTH_USER:-flow_admin}
      BASIC_AUTH_PASSWORD: ${BASIC_AUTH_PASSWORD:-change_me_now}
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/favicon.svg:/usr/share/nginx/html/favicon.svg:ro
    command: >
      /bin/sh -c "apk add --no-cache apache2-utils >/dev/null &&
      rm -f /etc/nginx/.htpasswd &&
      htpasswd -c -B -b /etc/nginx/.htpasswd $${BASIC_AUTH_USER} $${BASIC_AUTH_PASSWORD} &&
      nginx -g 'daemon off;'"
    depends_on:
      - ui
    restart: unless-stopped

volumes:
  flow_pg_data:
