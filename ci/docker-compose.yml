services:
  postgres:
    image: postgres:16-alpine
    container_name: flow_gen2_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - flow_pg_data:/var/lib/postgresql/data
      - ./init/flow_init.sql:/docker-entrypoint-initdb.d/00_flow_init.sql:ro
      - ./init/flow_seed.sql:/docker-entrypoint-initdb.d/01_flow_seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-flow_user} -d ${POSTGRES_DB:-flow_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    container_name: flow_gen2_api
    build:
      context: ..
      dockerfile: ci/Dockerfile
    environment:
      PORT: 5556
      # Comma-separated list; include deployed UI origins
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:5557,http://89.35.124.200:5557}
    ports:
      - "5556:5556"
    depends_on:
      - postgres
    restart: unless-stopped

  ui_api_test:
    container_name: flow_gen2_ui_api_test
    build:
      context: ..
      dockerfile: ci/Dockerfile.ui_api_test
    ports:
      - "5557:5557"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  flow_pg_data:
